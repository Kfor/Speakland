      Speakland Foundation — 项目脚手架 + 基础设施。


      PRD: docs/prds/speakland-app.md

      LLM Proxy PRD: docs/prds/llm-api-supabase-edge-function.md


      从零搭建 Speakland Expo 项目的全部基础设施，不含用户可见功能界面。


      具体范围：


      1. Expo 项目初始化（expo-router file-based routing, TypeScript strict）

      2. 安装所有依赖：@supabase/supabase-js, zustand, expo-av, expo-speech, react-native-reanimated, expo-auth-session
      (Google/Apple Sign-In), react-native-purchases (RevenueCat), 以及其他 PRD 要求的库

      3. 项目配置：app.json（scheme, plugins, splash）, tsconfig.json, babel.config.js, .env.example（列出所有需要的环境变量）

      4. Supabase 集成：
         - client 初始化（lib/supabase.ts）
         - 完整 DB schema SQL（stories, characters, chapters, dialogue_history, game_states, user_word_books, user_profiles 等表）
         - RLS policies（按用户隔离数据）
         - 本地开发用的 seed data
      5. Supabase Edge Function: llm-proxy/index.ts
         - JWT 认证
         - 流式（SSE 透传）+ 非流式转发
         - 从服务端环境变量读取 LLM_API_KEY, LLM_API_ENDPOINT, LLM_MODEL
         - 参考 docs/prds/llm-api-supabase-edge-function.md 完整实现
      6. Auth 完整流程：
         - Google Sign-In + Apple Sign-In
         - 登录/登出/session 管理/自动恢复
         - AuthContext provider
      7. RevenueCat 初始化 + Purchases.configure

      8. expo-router 导航结构：
         - app/_layout.tsx（root，providers wrap）
         - app/onboarding/ 目录（预留）
         - app/(tabs)/_layout.tsx（3 tab 结构：首页/角色/单词本）
         - app/scene/[id].tsx（预留）
         - app/paywall.tsx（预留）
      9. 共享类型定义 types/（Story, Character, Chapter, DialogueMessage, GameState, WordEntry, UserProfile, OnboardingData 等）

      10. 主题常量 constants/（颜色、字体、间距）

      11. Zustand stores 骨架（useAuthStore, useOnboardingStore, useGameStore, useVocabularyStore）

      12. lib/llmClient.ts 公共调用层：
          - callLlmProxy()（非流式）
          - streamLlmProxy()（流式 SSE）
          - 从 supabase session 获取 JWT
          - 未登录时 mock fallback
      13. 确保 npx expo start 可正常启动（至少 web 端无报错）


      不做：任何用户可见的功能界面和交互（Onboarding 页面、Tab 页面内容、场景 UI 等由后续任务实现）。导航结构只建骨架（空页面占位）。
